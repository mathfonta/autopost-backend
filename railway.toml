[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# NOTA AC4 (Story 12.2): O limite de body size do proxy Railway é gerenciado pela
# infraestrutura da plataforma (não configurável via railway.toml ou variável de ambiente).
# O backend aceita até 500 MB, mas vídeos > ~100 MB podem ser rejeitados pelo proxy
# antes de chegar à aplicação. Para vídeos muito grandes, a solução definitiva é
# upload direto ao R2 via presigned URL (fora do escopo desta story).

# ─── Serviço: API ────────────────────────────────────────────
[[services]]
name = "api"
releaseCommand = "alembic upgrade head"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30

# ─── Serviço: Worker Celery ──────────────────────────────────
[[services]]
name = "worker"
startCommand = "celery -A app.tasks worker --loglevel=info --concurrency=2"

# ─── Serviço: Beat (Scheduler) ───────────────────────────────
[[services]]
name = "beat"
startCommand = "celery -A app.tasks beat --loglevel=info --schedule=/tmp/celerybeat-schedule --pidfile=/tmp/celerybeat.pid"
